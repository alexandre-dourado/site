<script>
// ============================================================
//  CONFIG — URL do Apps Script (preencha após publicar)
// ============================================================
const APPS_SCRIPT_URL = ''; // ex: https://script.google.com/macros/s/AKf.../exec

// ============================================================
//  CSV PARSER
// ============================================================
function parseCSV(text) {
  const lines = [];
  let cur = '', inQ = false;
  const cells = () => {
    const row = []; let c=''; let inq=false;
    for (let i=0;i<cur.length;i++) {
      const ch=cur[i];
      if (ch==='"') { inq=!inq; continue; }
      if (ch===',' && !inq) { row.push(c.trim()); c=''; continue; }
      c+=ch;
    }
    row.push(c.trim()); return row;
  };
  const rows = [];
  for (const ch of text) {
    if (ch==='"') { inQ=!inQ; cur+=ch; }
    else if (ch==='\n' && !inQ) { rows.push(cur); cur=''; }
    else cur+=ch;
  }
  if (cur) rows.push(cur);

  if (!rows.length) return [];
  const headers = rows[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());
  return rows.slice(1).filter(r=>r.trim()).map(r => {
    const vals = cells.call({cur:r});
    // fallback: simple split
    const parts = r.split(',');
    const obj = {};
    headers.forEach((h,i) => {
      let v = (vals[i]!==undefined?vals[i]:parts[i]||'');
      obj[h] = v.replace(/^"|"$/g,'').trim();
    });
    return obj;
  });
}

// Simpler robust parser
function csvToObjects(text) {
  const rows = [];
  const re = /("(?:[^"]|"")*"|[^,\n]*)/g;
  const lines = text.split('\n').filter(l=>l.trim());
  if (!lines.length) return [];
  const headers = lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());
  for (let i=1;i<lines.length;i++) {
    const cols = lines[i].split(',');
    const obj = {};
    headers.forEach((h,j) => { obj[h] = (cols[j]||'').replace(/^"|"$/g,'').trim(); });
    if (Object.values(obj).some(v=>v)) rows.push(obj);
  }
  return rows;
}

// ============================================================
//  STATE
// ============================================================
const S = {
  projects:[], categories:[], config:{},
  filterCat:null, filterTags:new Set(), filterText:'',
  view:'grid',
};

// ============================================================
//  LOAD
// ============================================================
async function loadData() {
  try {
    const [pRes, cRes, aRes] = await Promise.all([
      fetch(CSV_PROJETOS   + '&t=' + Date.now()),
      fetch(CSV_CATEGORIAS + '&t=' + Date.now()).catch(()=>null),
      fetch(CSV_ADMIN      + '&t=' + Date.now()).catch(()=>null),
    ]);

    const pText = await pRes.text();
    S.projects = csvToObjects(pText).map(p => {
      // normaliza campos comuns
      p.titulo    = p.titulo    || p['título']      || p.title    || '';
      p.descricao = p.descricao || p['descrição']   || p.desc     || '';
      p.thumb     = p.thumb     || p['url da thumb']|| p['url thumb'] || '';
      p.link      = p.link      || p['url do link'] || p['url link']  || '';
      p.tags      = p.tags ? p.tags.split(',').map(t=>t.trim()).filter(Boolean) : [];
      return p;
    }).filter(p => p.titulo || p.link);

    if (cRes && cRes.ok) {
      const cText = await cRes.text();
      S.categories = csvToObjects(cText).filter(c => c.nome || c.name);
      S.categories = S.categories.map(c => ({
        id:    c.id    || c.nome,
        nome:  c.nome  || c.name,
        cor:   c.cor   || c.color || '#6C63FF',
        icone: c.icone || c.icon  || '',
      }));
    }

    if (aRes && aRes.ok) {
      const aText = await aRes.text();
      const rows = csvToObjects(aText);
      rows.forEach(r => {
        const key = r.chave || r.key;
        const val = r.valor || r.value;
        if (key) S.config[key] = val;
      });
    }

    // defaults
    S.config = Object.assign({
      siteTitle:'Minha Galeria', siteIcon:'🗂️', logoUrl:'',
      colorScheme:'dark', accentColor:'#6C63FF',
      cardStyle:'modern', galleryStyle:'grid', columns:'3', customCss:''
    }, S.config);

  } catch(e) {
    console.error('Erro ao carregar CSVs:', e);
    // tenta dados mockados
    S.projects = [];
  }
}

window.addEventListener('DOMContentLoaded', async () => {
  await loadData();
  if (APPS_SCRIPT_URL) {
    document.getElementById('link-apps-script').href = APPS_SCRIPT_URL;
  }
  applyConfig(S.config);
  renderAll();
  document.getElementById('loading-screen').classList.add('hide');
  bindEvents();
});

// ============================================================
//  APPLY CONFIG
// ============================================================
function applyConfig(cfg) {
  document.body.dataset.theme     = cfg.colorScheme || 'dark';
  document.body.dataset.cardStyle = cfg.cardStyle   || 'modern';
  if (cfg.accentColor) document.documentElement.style.setProperty('--accent', cfg.accentColor);
  document.documentElement.style.setProperty('--cols', parseInt(cfg.columns)||3);
  document.getElementById('site-title-el').textContent = cfg.siteTitle || 'Galeria';
  document.title = cfg.siteTitle || 'Galeria de Projetos';
  const iconEl = document.getElementById('logo-icon');
  if (cfg.logoUrl && cfg.logoUrl.startsWith('http')) {
    iconEl.innerHTML = `<img src="${cfg.logoUrl}" alt="logo" style="height:32px">`;
  } else {
    iconEl.textContent = cfg.siteIcon || '🗂️';
  }
  if (cfg.galleryStyle==='list') setView('list'); else setView('grid');
  const cssEl = document.getElementById('custom-css-el');
  if (cssEl && cfg.customCss) cssEl.textContent = cfg.customCss;
}

// ============================================================
//  RENDER
// ============================================================
function renderAll() { renderSidebar(); renderGallery(); }

function renderSidebar() {
  const catEl = document.getElementById('cat-filters');
  let html = `<button class="filter-btn ${!S.filterCat?'active':''}" data-cat="">
    <i class="fa-solid fa-border-all" style="opacity:.5;font-size:.8rem"></i>
    Todos <span class="count">${S.projects.length}</span>
  </button>`;
  S.categories.forEach(c => {
    const count = S.projects.filter(p=>p.categoria===c.nome||p.categoria===c.id).length;
    const icon  = catIcon(c);
    html += `<button class="filter-btn ${S.filterCat===c.nome?'active':''}" data-cat="${c.nome}">
      <span class="cat-dot" style="background:${c.cor}"></span>${icon} ${escHtml(c.nome)}
      <span class="count">${count}</span>
    </button>`;
  });
  catEl.innerHTML = html;
  catEl.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => {
    S.filterCat = b.dataset.cat || null; renderAll(); updateClearBtn();
  }));

  const allTags = new Set();
  S.projects.forEach(p=>(p.tags||[]).forEach(t=>allTags.add(t)));
  const tagEl = document.getElementById('tag-filters');
  tagEl.innerHTML = [...allTags].map(t =>
    `<span class="tag-chip ${S.filterTags.has(t)?'active':''}" data-tag="${t}">${t}</span>`
  ).join('');
  tagEl.querySelectorAll('.tag-chip').forEach(chip => chip.addEventListener('click', () => {
    const t=chip.dataset.tag; S.filterTags.has(t)?S.filterTags.delete(t):S.filterTags.add(t);
    renderAll(); updateClearBtn();
  }));
}

function filteredProjects() {
  return S.projects.filter(p => {
    const matchCat  = !S.filterCat || p.categoria===S.filterCat;
    const matchTags = S.filterTags.size===0||[...S.filterTags].every(t=>(p.tags||[]).includes(t));
    const q=S.filterText.toLowerCase();
    const matchText = !q||(p.titulo||'').toLowerCase().includes(q)||(p.descricao||'').toLowerCase().includes(q)||(p.tags||[]).some(t=>t.toLowerCase().includes(q));
    return matchCat&&matchTags&&matchText;
  });
}

function renderGallery() {
  const gallery = document.getElementById('gallery');
  const items   = filteredProjects();
  document.getElementById('count').textContent = items.length;
  if (!items.length) {
    gallery.innerHTML=`<div class="empty-state"><i class="fa-solid fa-ghost"></i><p>Nenhum projeto encontrado.</p></div>`;
    return;
  }
  gallery.innerHTML = items.map((p,i)=>buildCard(p,i)).join('');
  gallery.querySelectorAll('.card[data-link]').forEach(card => {
    card.addEventListener('click', () => window.open(card.dataset.link,'_blank'));
  });
}

function buildCard(p, idx) {
  const cat = S.categories.find(c=>c.nome===p.categoria||c.id===p.categoria);
  const catColor = cat?cat.cor:'#666';
  const catBg    = hexToRgba(catColor,.15);
  const icon     = cat?catIcon(cat):'';
  const thumb    = p.thumb||'';
  const link     = p.link||'#';
  const tags     = p.tags||[];
  const thumbHtml = thumb
    ? `<img src="${escHtml(thumb)}" alt="${escHtml(p.titulo)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-thumb-placeholder>🔗</div>'">`
    : `<div class="card-thumb-placeholder">🔗</div>`;
  const catHtml = p.categoria
    ? `<span class="card-category" style="background:${catBg};color:${catColor}">${icon} ${escHtml(p.categoria)}</span>` : '';
  const tagsHtml = tags.length
    ? `<div class="card-tags">${tags.slice(0,4).map(t=>`<span class="card-tag">${escHtml(t)}</span>`).join('')}</div>` : '';
  return `<article class="card" data-link="${escHtml(link)}" style="animation-delay:${Math.min(idx*.06,.4)}s">
    <div class="card-thumb">${thumbHtml}</div>
    <div class="card-body">
      ${catHtml}
      <h3 class="card-title">${escHtml(p.titulo)}</h3>
      ${p.descricao?`<p class="card-desc">${escHtml(p.descricao)}</p>`:''}
      ${tagsHtml}
    </div>
    <div class="card-arrow"><i class="fa-solid fa-arrow-up-right-from-square"></i></div>
  </article>`;
}

function catIcon(c) {
  if(!c.icone)return'';
  if(c.icone.startsWith('fa'))return`<i class="fa-solid ${c.icone}" style="color:${c.cor};font-size:.8rem"></i>`;
  return`<span>${c.icone}</span>`;
}

function setView(v) {
  S.view=v;
  document.getElementById('gallery').classList.toggle('list-view',v==='list');
  document.getElementById('btn-grid').classList.toggle('active',v==='grid');
  document.getElementById('btn-list').classList.toggle('active',v==='list');
}

function bindEvents() {
  document.getElementById('search-input').addEventListener('input',e=>{S.filterText=e.target.value;renderAll();updateClearBtn();});
  document.getElementById('btn-grid').addEventListener('click',()=>{setView('grid');renderGallery();});
  document.getElementById('btn-list').addEventListener('click',()=>{setView('list');renderGallery();});
  document.getElementById('btn-clear-filters').addEventListener('click',clearFilters);
  document.getElementById('admin-fab').addEventListener('click',()=>openModal('modal-login'));
  document.querySelectorAll('.modal-overlay').forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)closeModal(ov.id);}));
}

function updateClearBtn(){const a=S.filterCat||S.filterTags.size||S.filterText;document.getElementById('btn-clear-filters').style.display=a?'':'none';}
function clearFilters(){S.filterCat=null;S.filterTags=new Set();S.filterText='';document.getElementById('search-input').value='';renderAll();document.getElementById('btn-clear-filters').style.display='none';}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function toast(msg,type='success'){const el=document.createElement('div');el.className=`toast ${type}`;el.innerHTML=`<i class="fa-solid ${type==='success'?'fa-circle-check':'fa-circle-xmark'}"></i> ${escHtml(msg)}`;document.getElementById('toast-container').appendChild(el);setTimeout(()=>el.remove(),3500);}
function escHtml(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function hexToRgba(hex,alpha){hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);return`rgba(${r},${g},${b},${alpha})`;}
</script>
