<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promptologia - Redirecionando...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
        #slideshow {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }
        #loader {
            color: #FFFFFF;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="loader">Carregando...</div>
    <img id="slideshow" src="" alt="Promptologia">

    <script>
        // Configuração de cada frame e seus respectivos tempos em milissegundos
        const frames = [
            { src: '1.png', time: 300 },
            { src: '2.png', time: 200 },
            { src: '3.png', time: 300 },
            { src: '4.png', time: 300 },
            { src: '5.png', time: 300 },
            { src: '6.png', time: 300 },
            { src: '7.png', time: 100 },
            { src: '8.png', time: 300 },
            { src: '9.png', time: 300 },
            { src: '10.png', time: 300 },
            { src: '11.png', time: 200 },
            { src: '12.png', time: 300 },
            { src: '13.png', time: 300 }
        ];

        let loadedImagesCount = 0;
        const preloadedImages = [];

        // 1. Pré-carregar todas as imagens na memória para evitar lentidão ou tela preta
        frames.forEach((frame, index) => {
            const img = new Image();
            img.onload = checkLoad;
            img.onerror = checkLoad; // Continua mesmo se alguma imagem falhar
            img.src = frame.src;
            preloadedImages[index] = img;
        });

        function checkLoad() {
            loadedImagesCount++;
            // Quando todas estiverem carregadas na memória, inicia a sequência
            if (loadedImagesCount === frames.length) {
                startSequence();
            }
        }

        // 2. Lógica da sequência de imagens
        function startSequence() {
            document.getElementById('loader').style.display = 'none';
            const slideEl = document.getElementById('slideshow');
            slideEl.style.display = 'block';

            let currentIndex = 0;
            let loopsRemaining = 2; // Toca a sequência inteira 2 vezes para dar a sensação de loop antes de sair

            function showNextFrame() {
                if (currentIndex >= frames.length) {
                    loopsRemaining--;
                    if (loopsRemaining > 0) {
                        currentIndex = 0; // Reinicia o ciclo
                    } else {
                        // Fim do ciclo visual: aguarda 3 segundos e redireciona
                        setTimeout(() => {
                            window.location.href = 'https://instagram.com/promptologia.oficial';
                        }, 3000);
                        return; // Interrompe a recursão do slideshow
                    }
                }

                // Troca a imagem atual
                slideEl.src = frames[currentIndex].src;
                const duration = frames[currentIndex].time;
                currentIndex++;

                // Chama o próximo frame no tempo configurado
                setTimeout(showNextFrame, duration);
            }

            // Inicia o primeiro frame
            showNextFrame();
        }
    </script>
</body>
</html>
